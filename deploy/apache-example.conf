# apache-example.conf – Apache-Beispielkonfiguration: Reverse Proxy für den
# Veranstaltungszeitplaner.
#
# Für Server, auf denen bereits Apache auf Port 80/443 läuft (z. B. weil dort
# schon andere Webseiten gehostet werden) – Alternative zu nginx-example.conf,
# ohne dass zusätzlich nginx installiert werden muss. Andere VirtualHosts auf
# demselben Server bleiben unangetastet.
#
# Voraussetzungen (einmalig):
#   a2enmod proxy proxy_http headers
#   systemctl restart apache2
#
# Installation:
#   cp apache-example.conf /etc/apache2/sites-available/veranstaltungszeitplaner.conf
#   a2ensite veranstaltungszeitplaner
#   apache2ctl configtest && systemctl reload apache2
#
# Danach HTTPS einrichten (Domain muss auf den Server zeigen):
#   apt install -y certbot python3-certbot-apache
#   certbot --apache -d plan.example.de

<VirtualHost *:80>
    # Eigene (Sub-)Domain eintragen – unabhängig von den anderen auf diesem
    # Server gehosteten Seiten, die ihre eigenen VirtualHosts behalten:
    ServerName plan.example.de

    # Bild-Uploads erlauben (API-Limit ist 5 MB, etwas Puffer für den Overhead)
    LimitRequestBody 10485760

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/

    # mod_proxy setzt X-Forwarded-For/-Host/-Server automatisch; das Protokoll
    # muss für die Weiterleitung explizit ergänzt werden:
    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog  ${APACHE_LOG_DIR}/veranstaltungszeitplaner-error.log
    CustomLog ${APACHE_LOG_DIR}/veranstaltungszeitplaner-access.log combined
</VirtualHost>

# --- certbot / Let's Encrypt ---
# "certbot --apache" legt automatisch einen zusätzlichen <VirtualHost *:443>-
# Block mit den Zertifikatspfaden an und ergänzt eine Weiterleitung von HTTP
# auf HTTPS. In diesem HTTPS-Block von Hand ergänzen (certbot fügt es nicht
# automatisch ein), damit die App weiß, dass die Verbindung verschlüsselt ist:
#   RequestHeader set X-Forwarded-Proto "https"
