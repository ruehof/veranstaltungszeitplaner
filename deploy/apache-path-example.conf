# apache-path-example.conf – Reverse-Proxy-Snippet für den Veranstaltungszeitplaner
# UNTER EINEM PFAD einer bereits bestehenden Domain, z. B.
# https://sportinstitut.uni-wuppertal.de/wochenplaner/
#
# Anders als apache-example.conf (eigene Subdomain, eigener VirtualHost) wird
# hier KEIN neuer VirtualHost angelegt. Stattdessen werden diese Zeilen in die
# BESTEHENDE VirtualHost-Konfiguration der Domain eingefügt (z. B.
# /etc/apache2/sites-available/sportinstitut.conf oder wie auch immer diese
# beim Institut/der Universität heißt). Läuft die Domain schon über HTTPS
# (meist der Fall bei einer zentralen Institutsseite), reicht es, diese Zeilen
# im *:443-VirtualHost-Block einzufügen; ein *:80-Block leitet dort meist
# ohnehin nur auf HTTPS um, ohne selbst etwas auszuliefern.
#
# Voraussetzungen (einmalig, falls noch nicht vorhanden):
#   a2enmod proxy proxy_http headers
#   systemctl restart apache2
#
# Nach dem Einfügen:
#   apache2ctl configtest && systemctl reload apache2
#
# WICHTIG: Der abschließende Schrägstrich bei ProxyPass/ProxyPassReverse ist
# entscheidend – er sorgt dafür, dass Apache "/wochenplaner/" vor der
# Weiterleitung an den Node-Server abschneidet. Die App selbst weiß dadurch
# nichts von diesem Pfad-Präfix (sie ist so gebaut, dass sie unverändert
# funktioniert, egal unter welchem Pfad sie erreichbar gemacht wird).

    # --- Veranstaltungszeitplaner: Anfang ---
    ProxyPass /wochenplaner/ http://127.0.0.1:3002/
    ProxyPassReverse /wochenplaner/ http://127.0.0.1:3002/

    <Location /wochenplaner/>
        # Bild-Uploads erlauben (API-Limit ist 5 MB, etwas Puffer für den Overhead)
        LimitRequestBody 10485760

        # Nur nötig, falls für diese Domain kein automatisches "X-Forwarded-Proto"
        # gesetzt wird (z. B. wenn es noch keinen weiteren Reverse Proxy davor gibt).
        # Im *:443-Block "https", im *:80-Block "http" eintragen:
        RequestHeader set X-Forwarded-Proto "https"
    </Location>
    # --- Veranstaltungszeitplaner: Ende ---
