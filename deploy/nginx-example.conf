# nginx-Beispielkonfiguration: Reverse Proxy für den Veranstaltungszeitplaner
#
# Installation:
#   cp nginx-example.conf /etc/nginx/sites-available/veranstaltungszeitplaner.conf
#   ln -s /etc/nginx/sites-available/veranstaltungszeitplaner.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Danach HTTPS einrichten (Domain muss auf den Server zeigen):
#   certbot --nginx -d plan.example.de

server {
    listen 80;
    listen [::]:80;

    # Eigene Domain eintragen:
    server_name plan.example.de;

    # Bild-Uploads erlauben (API-Limit ist 5 MB, etwas Puffer für den Overhead):
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- certbot / Let's Encrypt ---
    # Die folgenden Zeilen fügt certbot bei "certbot --nginx" automatisch hinzu
    # (HTTPS-Listener auf Port 443, Zertifikatspfade, Redirect von HTTP auf HTTPS).
    # Hier nichts von Hand eintragen, sofern certbot verwendet wird.
    #
    # listen 443 ssl; # managed by Certbot
    # ssl_certificate /etc/letsencrypt/live/plan.example.de/fullchain.pem; # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/plan.example.de/privkey.pem; # managed by Certbot
}
